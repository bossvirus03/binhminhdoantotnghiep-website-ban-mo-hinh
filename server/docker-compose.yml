version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: models_shop_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: models_shop
    ports:
      - '5432:5432'
    volumes:
      - models_shop_pgdata:/var/lib/postgresql/data
volumes:
  models_shop_pgdata:
